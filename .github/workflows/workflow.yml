name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: pip install flake8 nose

    - name: Lint Code
      run: flake8 .

    - name: Run Tests
      run: nosetests
